name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / PW ${{ matrix.pw }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['18', '20', '22']
        pw: ['1.40.0', 'latest']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright ${{ matrix.pw }}
        run: |
          if [ "${{ matrix.pw }}" = "latest" ]; then
            pnpm add -D @playwright/test@latest
          else
            pnpm add -D @playwright/test@${{ matrix.pw }}
          fi
        shell: bash

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint + Format check
        run: pnpm check

      - name: Test
        run: pnpm test
